<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ対応ブロック崩し</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* スクロール禁止 */
        }
        canvas {
            background-color: #111;
            border: 4px solid #444;
            border-radius: 8px;
            /* タッチ時のスクロールを無効化 */
            touch-action: none; 
            /* 幅を画面に合わせて調整 */
            width: 90vw;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <h1>モンスターブロック崩し</h1>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let ball = { x: 200, y: 500, dx: 4, dy: -4, radius: 8, color: "#ffdd67" };
        let paddle = { height: 15, width: 80, x: 160, color: "#00adb5" };

        const blockRowCount = 4;
        const blockColumnCount = 5;
        const blockWidth = 65;
        const blockHeight = 25;
        const blockPadding = 8;
        const blockOffsetTop = 50;
        const blockOffsetLeft = 20;

        let blocks = [];
        for (let c = 0; c < blockColumnCount; c++) {
            blocks[c] = [];
            for (let r = 0; r < blockRowCount; r++) {
                blocks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        // --- 操作系 (マウス & タッチ両対応) ---
        function movePaddle(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width; // 画面サイズとCanvasサイズの比率
            const relativeX = (clientX - rect.left) * scaleX;
            
            if (relativeX > 0 && relativeX < canvas.width) {
                paddle.x = relativeX - paddle.width / 2;
            }
        }

        // マウス
        document.addEventListener("mousemove", (e) => movePaddle(e.clientX));
        // タッチ
        document.addEventListener("touchmove", (e) => {
            e.preventDefault(); // 画面スクロール防止
            movePaddle(e.touches[0].clientX);
        }, { passive: false });

        function collisionDetection() {
            for (let c = 0; c < blockColumnCount; c++) {
                for (let r = 0; r < blockRowCount; r++) {
                    let b = blocks[c][r];
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + blockWidth && ball.y > b.y && ball.y < b.y + blockHeight) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            if (checkWin()) { alert("クリア！"); document.location.reload(); }
                        }
                    }
                }
            }
        }

        function checkWin() {
            for (let c = 0; c < blockColumnCount; c++) {
                for (let r = 0; r < blockRowCount; r++) {
                    if (blocks[c][r].status === 1) return false;
                }
            }
            return true;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ブロック
            for (let c = 0; c < blockColumnCount; c++) {
                for (let r = 0; r < blockRowCount; r++) {
                    if (blocks[c][r].status === 1) {
                        let blockX = (c * (blockWidth + blockPadding)) + blockOffsetLeft;
                        let blockY = (r * (blockHeight + blockPadding)) + blockOffsetTop;
                        blocks[c][r].x = blockX; blocks[c][r].y = blockY;
                        ctx.beginPath();
                        ctx.rect(blockX, blockY, blockWidth, blockHeight);
                        ctx.fillStyle = "#ff5722";
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }

            // ボール
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();

            // パドル
            ctx.beginPath();
            ctx.rect(paddle.x, canvas.height - paddle.height - 20, paddle.width, paddle.height);
            ctx.fillStyle = paddle.color;
            ctx.fill();
            ctx.closePath();
            
            collisionDetection();

            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) ball.dx = -ball.dx;
            if (ball.y + ball.dy < ball.radius) ball.dy = -ball.dy;
            else if (ball.y + ball.dy > canvas.height - ball.radius - paddle.height - 20) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) ball.dy = -ball.dy;
                else if (ball.y + ball.dy > canvas.height - ball.radius) { alert("ゲームオーバー"); document.location.reload(); }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
